name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Blocking gate: the supported core matrix must stay green.
  test:
    name: lint · type · test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs needs full history/tags for versioning

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Create venv (py${{ matrix.python-version }})
        run: uv venv --python ${{ matrix.python-version }}

      - name: Install (dev extras)
        run: uv pip install -e ".[dev]"

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Ruff (format check)
        run: uv run ruff format --check .

      - name: Mypy (strict)
        run: uv run mypy

      - name: Pytest
        run: uv run pytest --cov --cov-report=term-missing

  # Non-blocking: extra Python versions, Windows, and the NumPy floor. These
  # surface platform/version issues without gating merges.
  test-extra:
    name: extra (${{ matrix.os }}, py${{ matrix.python-version }}, ${{ matrix.numpy }})
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
            numpy: "numpy>=1.24,<2"
          - os: ubuntu-latest
            python-version: "3.13"
            numpy: "numpy>=2"
          - os: windows-latest
            python-version: "3.12"
            numpy: "numpy>=2"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Create venv (py${{ matrix.python-version }})
        run: uv venv --python ${{ matrix.python-version }}

      - name: Install (dev extras) with pinned NumPy
        run: |
          uv pip install -e ".[dev]"
          uv pip install "${{ matrix.numpy }}"

      - name: Pytest
        run: uv run pytest -q

  core-only-import:
    # Enforce the dependency boundary: the core package must import with ONLY
    # numpy installed — no rerun, no torch, no optional extras.
    name: core-only import (no rerun/torch)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Create venv
        run: uv venv --python 3.12

      - name: Install core only (no extras)
        run: uv pip install -e .

      - name: Assert optional deps are absent, then import
        run: |
          uv run python - <<'PY'
          import importlib.util
          for mod in ("rerun", "torch"):
              assert importlib.util.find_spec(mod) is None, f"{mod} unexpectedly installed"
          import robolens
          print("robolens", robolens.__version__, "imported with core deps only")
          PY
