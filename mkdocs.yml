site_name: Inspect Robots
site_description: >-
  The Inspect AI for robotics — an evaluation framework for physical AI and VLA
  (vision-language-action) models.
site_url: https://inspectrobots.org/
repo_url: https://github.com/robocurve/inspect-robots
repo_name: robocurve/inspect-robots
edit_uri: edit/main/docs/
copyright: Copyright &copy; Inspect Robots contributors

theme:
  name: material
  icon:
    logo: material/robot-outline
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.action.edit

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: sphinx
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            show_source: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            merge_init_into_class: true
            filters: ["!^_"]
  - llmstxt:
      markdown_description: >-
        Inspect Robots is the open-source evaluation framework for physical AI and VLA
        (vision-language-action) models — the "Inspect AI for robotics". A
        benchmark is a Task (dataset of Scenes + scorers) run against two
        swappable inputs: a Policy (the VLA) and an Embodiment (a real robot or
        simulator).
      full_output: llms-full.txt
      sections:
        Guide:
          - index.md
          - guide/quickstart.md
          - guide/concepts.md
          - guide/writing-a-benchmark.md
          - guide/policies-and-embodiments.md
          - guide/scoring.md
          - guide/logging-and-rerun.md
          - guide/plugins.md
          - guide/cli.md

nav:
  - Home: index.md
  - Guide:
      - guide/quickstart.md
      - guide/concepts.md
      - guide/writing-a-benchmark.md
      - guide/policies-and-embodiments.md
      - guide/scoring.md
      - guide/logging-and-rerun.md
      - guide/plugins.md
      - guide/cli.md
  - API reference: api/index.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/robocurve/inspect-robots
